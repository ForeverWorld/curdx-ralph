name: "Bug Report"
description: Report a defect or regression in CURDX.
title: "[BUG] "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this issue consistently.
          required: true
  - type: input
    id: version
    attributes:
      label: CURDX version / commit
      description: Output of `git rev-parse --short HEAD` in your plugin repo.
      placeholder: "e.g. 11045c4"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Claude Code version, and key config.
      placeholder: |
        - OS:
        - Shell:
        - Claude Code:
        - Relevant env vars:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Include relevant `.curdx`/hook logs or CLI output.
      render: shell
    validations:
      required: false
