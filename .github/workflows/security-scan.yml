name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    env:
      TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.65.0
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Trivy DB
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Download Trivy DB (with retry)
        run: |
          set -euo pipefail
          mkdir -p "${TRIVY_CACHE_DIR}"

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              n=$((n + 1))
              sleep $((n * 5))
            done
          }

          retry 3 docker run --rm \
            -v "${TRIVY_CACHE_DIR}:/tmp/trivy-cache" \
            "${TRIVY_IMAGE}" image --download-db-only --cache-dir /tmp/trivy-cache

      - name: Run Trivy vulnerability + secret scan
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "${TRIVY_CACHE_DIR}:/tmp/trivy-cache" \
            -w /work \
            "${TRIVY_IMAGE}" fs \
            --cache-dir /tmp/trivy-cache \
            --skip-db-update \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            --output trivy-results.txt \
            .

      - name: Publish results to summary
        if: always()
        run: |
          if [[ -s trivy-results.txt ]]; then
            {
              echo "### Trivy findings"
              echo "<details><summary>Expand scan output</summary>"
              echo ""
              echo '```'
              cat trivy-results.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Trivy: no CRITICAL/HIGH findings" >> "$GITHUB_STEP_SUMMARY"
          fi
